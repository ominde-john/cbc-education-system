<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="/favicon.jpg" />
    <link rel="shortcut icon" href="/favicon.jpg" type="image/jpeg" />

    <!-- Title for SEO -->
    <title>NONEAA - Competency-Based Education Management Platform</title>

    <!-- SEO Meta Tags -->
    <meta name="description" content="NONEAA is a Competency-Based Curriculum Management System for schools. Manage students, track performance, and optimize education outcomes." />
    <meta name="keywords" content="CBE, education platform, school management, student progress tracking, curriculum management, NONEAA" />
    <meta name="author" content="NONEAA Education Management Platform" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:title" content="NONEAA Education Management Platform" />
    <meta property="og:description" content="Manage schools, track student progress, and streamline competency-based education with NONEAA." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://noneaa.com" />
    <meta property="og:image" content="https://noneaa.com/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NONEAA Education Management Platform" />
    <meta name="twitter:description" content="Manage schools, track student progress, and streamline competency-based education with NONEAA." />
    <meta name="twitter:image" content="https://noneaa.com/og-image.png" />

    <!-- Theme Color for mobile browsers -->
    <meta name="theme-color" content="#1a73e8" />

    <!-- Preload Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" as="style" />

    <!-- Structured Data for SEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "EducationalOrganization",
      "name": "NONEAA Education Management Platform",
      "url": "https://noneaa.com",
      "logo": "https://noneaa.com/favicon.jpg",
      "sameAs": [
        "https://www.facebook.com/noneaa",
        "https://twitter.com/noneaa"
      ],
      "description": "Competency-Based Curriculum Management System for Schools. Manage students, track performance, and optimize education outcomes."
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
